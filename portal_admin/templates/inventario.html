{% extends "admin_layout.html" %}

{% block breadcrumb_active %}Inventario{% endblock %}

{% block admin_css %}
<style>
    .inv-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2.5rem;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .inv-header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        flex: 1;
    }

    .btn-add-product {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.75rem 1.4rem;
        border-radius: 14px;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
    }

    .btn-add-product:hover {
        background: #3730A3;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
    }

    .inv-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text-main);
    }

    .search-bar {
        position: relative;
        max-width: 400px;
        width: 100%;
    }

    .search-bar svg {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
    }

    .search-input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.75rem;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--card-bg);
        color: var(--text-main);
        font-size: 0.9rem;
        outline: none;
        transition: 0.2s;
    }

    .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* Estilos de Vista Previa */
    .image-preview-container {
        width: 100%;
        height: 180px;
        border: 2px dashed var(--border);
        border-radius: 12px;
        background: var(--bg-light);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        overflow: hidden;
        transition: 0.3s;
        position: relative;
    }
    .image-preview-container:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
    .image-preview-container img { width: 100%; height: 100%; object-fit: cover; }
    .image-preview-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted);
        text-align: center;
        padding: 1rem;
    }
    .image-preview-placeholder i { font-size: 2rem; }
    .image-preview-placeholder span { font-size: 0.75rem; font-weight: 700; }

    /* Indicador de carga en botón */
    .btn-loading {
        pointer-events: none;
        opacity: 0.8;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .btn-loading::after {
        content: '';
        width: 14px;
        height: 14px;
        border: 2px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin-loader 0.6s linear infinite;
    }
    @keyframes spin-loader { to { transform: rotate(360deg); } }

    /* Category Filters */
    .cat-filters {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }

    .cat-btn {
        padding: 0.65rem 1.25rem;
        border-radius: 99px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .cat-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    .cat-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    /* Inventory Table */
    .inv-card {
        background: var(--card-bg);
        border-radius: 20px;
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    thead {
        background: var(--bg-light);
        border-bottom: 1px solid var(--border);
    }

    th {
        padding: 1.25rem 1.5rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    td {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        color: var(--text-main);
        font-size: 0.9rem;
    }

    tr:last-child td {
        border-bottom: none;
    }

    .product-cell {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .product-thumb {
        width: 45px;
        height: 45px;
        border-radius: 10px;
        object-fit: cover;
        background: var(--bg-light);
        border: 1px solid var(--border);
    }

    .product-info strong {
        display: block;
        font-weight: 700;
        color: var(--text-main);
    }

    .product-info span {
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .stock-badge {
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 800;
    }

    .stock-ok {
        background: rgba(16, 185, 129, 0.1);
        color: #10B981;
    }

    .stock-low {
        background: rgba(245, 158, 11, 0.1);
        color: #F59E0B;
    }

    .stock-none {
        background: rgba(239, 68, 68, 0.1);
        color: #EF4444;
    }

    .btn-edit {
        background: var(--bg-light);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.6rem 1rem;
        border-radius: 10px;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-edit:hover {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .btn-delete {
        background: var(--bg-light);
        border: 1px solid var(--border);
        color: var(--danger);
        padding: 0.6rem 1rem;
        border-radius: 10px;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-delete:hover {
        background: var(--danger);
        color: white;
        border-color: var(--danger);
    }

    .btn-group {
        display: flex;
        gap: 0.5rem;
    }

    /* Form Styles within Modal */
    .edit-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.25rem;
        text-align: left;
    }

    .full-width {
        grid-column: span 2;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .field-group label {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .field-input,
    .field-select,
    .field-area {
        padding: 0.85rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-light);
        color: var(--text-main);
        font-size: 0.9rem;
        outline: none;
        transition: 0.2s;
        width: 100%;
    }

    .field-area {
        resize: none;
    }

    .field-input:focus,
    .field-select:focus,
    .field-area:focus {
        border-color: var(--accent);
    }

    .img-preview-box {
        width: 100%;
        height: 140px;
        border-radius: 14px;
        border: 2px dashed var(--border);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background-color: var(--bg-light);
    }

    .upload-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition: 0.2s;
    }

    .upload-overlay:hover {
        background: rgba(67, 56, 202, 0.8);
    }

    .img-inputs-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    /* Toggle Switch */
    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-light);
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
    }

    .toggle-label {
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--text-main);
        min-width: 90px;  /* evita layout shift al cambiar entre "Activo" y "Deshabilitado" */
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 22px;
    }

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 34px;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked+.slider {
        background-color: var(--accent);
    }

    input:checked+.slider:before {
        transform: translateX(22px);
    }
    .btn-download { 
        display: flex; 
        align-items: center; 
        gap: 0.75rem; 
        padding: 0.75rem 1.5rem; 
        border-radius: 12px; 
        background: var(--card-bg); 
        color: var(--text-main); 
        border: 1px solid var(--border); 
        font-weight: 700; 
        cursor: pointer; 
        transition: 0.3s; 
        font-size: 0.85rem; 
    }
    .btn-download:hover { 
        background: var(--bg-light); 
        border-color: var(--accent); 
    }
    .download-dropdown { position: relative; display: inline-block; }
    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        background-color: var(--card-bg);
        min-width: 170px;
        box-shadow: 0px 10px 20px 0px rgba(0,0,0,0.1);
        z-index: 1000;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-top: 5px;
        overflow: hidden;
    }
    .dropdown-content button {
        color: var(--text-main);
        padding: 12px 16px;
        display: block;
        width: 100%;
        border: none;
        background: none;
        text-align: left;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
    }
    .dropdown-content button:hover { background-color: var(--bg-light); color: var(--accent); }
    .show-dropdown { display: block !important; }
</style>
{% endblock %}

{% block admin_content %}
<div class="inv-header">
    <div class="inv-header-left">
        <h1>Gestión de inventario</h1>
        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre o ID..."
                onkeyup="applyFilters()">
        </div>
        <button class="btn-download" style="background: var(--bg-light); border-color: var(--border);" onclick="openFilterModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2L10 12.46V19L14 21V12.46L22 3Z"></path></svg>
            Filtros
        </button>
        <div class="download-dropdown">
            <button class="btn-download" onclick="toggleDownloadMenu()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Descargar inventario
            </button>
            <div id="downloadMenu" class="dropdown-content">
                <button onclick="downloadInventory('pdf')">Documento PDF (.pdf)</button>
                <button onclick="downloadInventory('xlsx')">Hoja de cálculo (.xlsx)</button>
                <button onclick="downloadInventory('docx')">Documento Word (.docx)</button>
            </div>
        </div>
    </div>
    <button class="btn-add-product" onclick="openAddProductModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Agregar producto
    </button>
</div>

<div class="cat-filters">
    <button class="cat-btn active" onclick="filterByCategory('all', this)">Todas</button>
    <button class="cat-btn" onclick="filterByCategory('motor', this)">Motor</button>
    <button class="cat-btn" onclick="filterByCategory('frenos', this)">Frenos</button>
    <button class="cat-btn" onclick="filterByCategory('suspension', this)">Suspensión</button>
    <button class="cat-btn" onclick="filterByCategory('electrico', this)">Eléctrico</button>
</div>

<div class="inv-card">
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio (MXN)</th>
                <th>Existencia</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let productos = [];

    // Llamada inicial para cargar productos
    async function loadProducts() {
        try {
            // Se usa el puerto de la API central o una ruta configurada
            const response = await fetch('http://127.0.0.1:8008/productos/');
            if(response.ok) {
                productos = await response.json();
                applyFilters();
            } else {
                console.error("Error al cargar productos", response.status);
            }
        } catch(error) {
            console.error("Error de conexión con la API Cental", error);
        }
    }

    function renderTable(data) {
        const tbody = document.querySelector('#inventoryTable tbody');
        tbody.innerHTML = '';
        data.forEach(p => {
            const stockClass = p.stock === 0 ? 'stock-none' : (p.stock < 5 ? 'stock-low' : 'stock-ok');
            const stateText = p.active ? 'Activo' : 'Deshabilitado';
            const stateColor = p.active ? 'var(--success)' : 'var(--danger)';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="product-cell">
                        <img src="${p.imagen}" class="product-thumb">
                        <div class="product-info">
                            <strong>${p.nombre}</strong>
                            <span>REF-${String(p.id).padStart(4, '0')}</span>
                        </div>
                    </div>
                </td>
                <td style="font-weight: 700;">$${p.precio}</td>
                <td><span class="stock-badge ${stockClass}">${p.stock} pz</span></td>
                <td><span style="font-weight: 800; color: ${stateColor}; font-size: 0.8rem; text-transform: uppercase;">${stateText}</span></td>
                <td>
                    <div class="btn-group">
                        <button class="btn-edit" onclick="openProductEditor(${p.id})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            Editar
                        </button>
                        <button class="btn-delete" onclick="confirmDeleteProduct(${p.id}, '${p.nombre}')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function confirmDeleteProduct(id, nombre) {
        showAppModal({
            title: 'Eliminar producto',
            body: '¿Estás seguro que deseas eliminar el producto: ' + nombre + '? Esta acción no se puede deshacer.',
            icon: 'alert',
            confirmText: 'Sí, eliminar',
            type: 'danger',
            onConfirm: async () => {
                try {
                    const res = await fetch('http://127.0.0.1:8008/productos/' + id, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        productos = productos.filter(p => p.id !== id);
                        applyFilters();
                        showAppModal({
                            title: 'Producto eliminado',
                            body: 'El producto ha sido eliminado del catálogo permanentemente.',
                            icon: 'help', confirmText: 'Aceptar', singleButton: true
                        });
                    }
                } catch(e) {
                    console.error(e);
                }
            }
        });
    }

    function openProductEditor(id) {
        const p = productos.find(x => x.id === id);

        const editorHtml = `
            <div class="edit-grid" style="gap: 2rem; align-items: stretch;">
                <!-- Columna Izquierda -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="field-group">
                        <label>Nombre del producto</label>
                        <input type="text" id="p-name" class="field-input" value="${p.nombre}" placeholder="Ej: Amortiguador de gas" onkeypress="return /[a-zA-ZáéíóúÁÉÍÓÚñÑ ]/.test(event.key)">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="field-group">
                            <label>Precio (MXN)</label>
                            <input type="text" id="p-price" class="field-input" value="${p.precio}" placeholder="Ej: 1450" onkeypress="return /[0-9]/.test(event.key)">
                        </div>
                        <div class="field-group">
                            <label>Stock actual</label>
                            <input type="text" id="p-stock" class="field-input" value="${p.stock}" placeholder="Ej: 15" onkeypress="return /[0-9]/.test(event.key)">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="field-group">
                            <label>Categoría</label>
                            <select id="p-cat" class="field-select">
                                <option value="motor" ${p.cat === 'motor' ? 'selected' : ''}>Motor</option>
                                <option value="frenos" ${p.cat === 'frenos' ? 'selected' : ''}>Frenos</option>
                                <option value="suspension" ${p.cat === 'suspension' ? 'selected' : ''}>Suspensión</option>
                                <option value="electrico" ${p.cat === 'electrico' ? 'selected' : ''}>Eléctrico</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>Estado en catálogo</label>
                            <div class="toggle-row">
                                <span class="toggle-label" id="status-label">${p.active ? 'Activo' : 'Deshabilitado'}</span>
                                <label class="switch">
                                    <input type="checkbox" id="p-active" ${p.active ? 'checked' : ''} onchange="document.getElementById('status-label').innerText = this.checked ? 'Activo' : 'Deshabilitado'">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="field-group">
                        <label>Descripción breve</label>
                        <textarea id="p-desc-breve" class="field-area" rows="3" placeholder="Resumen corto del producto...">${p.desc_breve || ''}</textarea>
                    </div>
                </div>

                <!-- Columna Derecha -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="field-group">
                        <label>Imagen del producto</label>
                        <div class="img-preview-box" id="imgBox" style="background-image: url('${p.imagen}'); height: 210px;">
                            <label class="upload-overlay">
                                Cambiar imagen
                                <input type="file" id="p-file" style="display:none;" accept="image/*" onchange="previewLocalImage(this)">
                            </label>
                        </div>
                        <div class="img-inputs-container">
                            <input type="text" id="p-img" class="field-input" value="${p.imagen}" placeholder="URL de la imagen" oninput="document.getElementById('imgBox').style.backgroundImage='url('+this.value+')'">
                        </div>
                    </div>

                    <div class="field-group" style="flex-grow: 1;">
                        <label>Descripción completa</label>
                        <textarea id="p-desc-completa" class="field-area" style="height: 100%; min-height: 180px;" placeholder="Describe todos los beneficios técnicos a detalle...">${p.desc_completa || ''}</textarea>
                    </div>
                </div>
            </div>
        `;

        showAppModal({
            title: 'Editar producto',
            htmlContent: editorHtml,
            icon: 'edit',
            confirmText: 'Guardar cambios',
            keepOpen: true,
            wide: true, // Esto expande el modal horizontalmente
            onConfirm: async () => {
                const name = document.getElementById('p-name').value.trim();
                const price = document.getElementById('p-price').value.trim();
                const stock = document.getElementById('p-stock').value.trim();
                const desc_breve = document.getElementById('p-desc-breve').value.trim();
                const desc_completa = document.getElementById('p-desc-completa').value.trim();
                const img = document.getElementById('p-img').value.trim();
                const cat = document.getElementById('p-cat').value;
                const active = document.getElementById('p-active').checked;

                // Validación de campos vacíos
                if (!name || !price || !stock || !desc_breve || !desc_completa || !img) {
                    showAppModal({
                        title: 'Campos incompletos',
                        body: 'Atención: Debes rellenar todos los campos correctamente antes de guardar.',
                        icon: 'alert',
                        confirmText: 'Entendido',
                        singleButton: true,
                        type: 'danger'
                    });
                    return;
                }

                // Guardado por medio de la API central
                const updatedData = {
                    nombre: name,
                    precio: price,
                    stock: parseInt(stock),
                    desc_breve: desc_breve,
                    desc_completa: desc_completa,
                    imagen: img,
                    cat: cat,
                    active: active
                };

                try {
                    const res = await fetch('http://127.0.0.1:8008/productos/' + p.id, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(updatedData)
                    });

                    if (res.ok) {
                        // Actualizar en el frontend actual
                        Object.assign(p, updatedData);
                        applyFilters();
                        closeModal();

                        setTimeout(() => {
                            showAppModal({
                                title: '¡Cambios aplicados!',
                                body: 'La información de ' + name + ' ha sido actualizada correctamente en el inventario global.',
                                icon: 'help', confirmText: 'Excelente', singleButton: true
                            });
                        }, 350);
                    } else {
                        throw new Error("Respuesta no OK");
                    }
                } catch(e) {
                    console.error(e);
                    showAppModal({
                        title: 'Error de conexión',
                        body: 'No se pudo contactar a la API central para actualizar el producto.',
                        icon: 'alert', confirmText: 'Entendido', singleButton: true, type: 'danger'
                    });
                }
            }
        });
    }

                    </div>
                    <div class="field-group">
                        <label>Precio máximo (MXN)</label>
                        <div style="position: relative;">

                            <input type="number" id="m-priceMax" class="field-input" style="padding-left: 2rem;" placeholder="Sin límite" value="${document.getElementById('priceMax_val')?.value || ''}">
                        </div>
                    </div>
                </div>

                <div class="detail-section-title">Categorías Rápidas</div>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; margin-bottom: 2rem;">
                    <button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="m_setCat('all', this)">Todo</button>
                    <button class="cat-btn ${currentCategory === 'motor' ? 'active' : ''}" onclick="m_setCat('motor', this)">Motor</button>
                    <button class="cat-btn ${currentCategory === 'frenos' ? 'active' : ''}" onclick="m_setCat('frenos', this)">Frenos</button>
                    <button class="cat-btn ${currentCategory === 'electrico' ? 'active' : ''}" onclick="m_setCat('electrico', this)">Eléctrico</button>
                    <button class="cat-btn ${currentCategory === 'suspension' ? 'active' : ''}" onclick="m_setCat('suspension', this)">Suspensión</button>

                <div class="detail-section-title">Segmentos de Inversión</div>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem;">
                    <button class="cat-btn" onclick="m_quickStock(5)">Stock bajo (< 5)</button>
                    <button class="cat-btn" onclick="m_quickPriceRange(0, 1000)">Esenciales (< $1k)</button>
                    <button class="cat-btn" onclick="m_quickPriceRange(2500, null)">Gama Alta (> $2.5k)</button>

    function m_setCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Actualizar la UI principal también
        document.querySelectorAll('.cat-filters .cat-btn').forEach(b => {
             const text = b.innerText.toLowerCase();
             const isMatch = (cat === 'all' && text.includes('todos')) || 
                           (cat === 'motor' && text.includes('motor')) ||
                           (cat === 'frenos' && text.includes('frenos')) ||
                           (cat === 'electrico' && text.includes('eléctrico')) ||
                           (cat === 'suspension' && text.includes('suspensión'));
             b.classList.toggle('active', isMatch);
        });

    function m_quickStock(limit) {
        window.tempStockLimit = limit;
        applyFilters(); 
        closeModal();
    }

    function m_quickPriceRange(min, max) {
        document.getElementById('m-priceMin').value = min || '';
        document.getElementById('m-priceMax').value = max || '';
    }

    function resetFilters() {
        currentCategory = 'all';
        document.getElementById('priceMin_val').value = '';
        document.getElementById('priceMax_val').value = '';
        document.getElementById('searchInput').value = '';
        window.tempStockLimit = null;
        applyFilters();
        closeModal();
    }

    function applyFilters() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const minPrice = parseFloat(document.getElementById('priceMin_val')?.value) || 0;
        const maxPrice = parseFloat(document.getElementById('priceMax_val')?.value) || Infinity;
        const stockLimit = window.tempStockLimit || Infinity;
        
        const filtered = productos.filter(p => {
            const matchesTerm = p.nombre.toLowerCase().includes(term) || String(p.id).includes(term);
            const matchesCat = currentCategory === 'all' || p.cat === currentCategory;
            const itemPrice = parseFloat(String(p.precio).replace(/[^0-9.]/g, ''));
            const matchesPrice = itemPrice >= minPrice && itemPrice <= maxPrice;
            const matchesStock = p.stock <= stockLimit;
            
            return matchesTerm && matchesCat && matchesPrice && matchesStock;
        });
        
        window.filteredProducts = filtered;
        renderTable(filtered);
    }

    // ─────────────── CONFIGURACIÓN DE CLOUDINARY ───────────────
    // Sustituye estos valores con los de tu cuenta de Cloudinary:
    const CLOUDINARY_CLOUD_NAME = 'dpvm2gro2';
    const CLOUDINARY_UPLOAD_PRESET = 'macuin_unsigned';
    const CLOUDINARY_FOLDER = 'MACUIN';

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', CLOUDINARY_FOLDER);

        const res = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
            { method: 'POST', body: formData }
        );
        if (!res.ok) throw new Error('Error al subir imagen a Cloudinary');
        const data = await res.json();
        return data.secure_url;
    }

    async function loadProducts() {
        // 1. Cargar desde caché inmediatamente para velocidad instantánea
        const cachedProducts = localStorage.getItem('macuin_inventory_cache');
        if (cachedProducts) {
            productos = JSON.parse(cachedProducts);
            applyFilters();
            // Ocultar loader si hay caché
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';
        }

        try {
            // 2. Consultar API en segundo plano
            const res = await fetch('http://127.0.0.1:8008/productos/');
            if (!res.ok) throw new Error('Error al conectar con la API');
            const data = await res.json();
            
            // 3. Actualizar datos y caché
            productos = data.map(p => ({
                id: p.id,
                nombre: p.nombre,
                precio: parseFloat(String(p.precio).replace(/[^0-9.]/g, '')).toLocaleString('es-MX', { minimumFractionDigits: 2 }),
                stock: p.stock,
                cat: p.cat || 'motor',
                desc_breve: p.desc_breve,
                desc_completa: p.desc_completa,
                imagen: p.imagen,
                active: p.active
            }));

            localStorage.setItem('macuin_inventory_cache', JSON.stringify(productos));
            
            // Inyectamos placeholders si no existen
            if (!document.getElementById('priceMin_val')) {
                const fMin = document.createElement('input');
                fMin.type = 'hidden'; fMin.id = 'priceMin_val';
                document.body.appendChild(fMin);
                
                const fMax = document.createElement('input');
                fMax.type = 'hidden'; fMax.id = 'priceMax_val';
                document.body.appendChild(fMax);
            }

            applyFilters();

            // Ocultar loader después de la carga real
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';

        } catch (e) {
            console.error("Error cargando inventario:", e);
            // Si no hay nada en caché y falla la API, mostrar error
            if (!productos.length) {
                showAppModal({
                    title: 'Error de conexión',
                    body: 'No pudimos obtener el inventario de la base de datos. Verifica tu conexión.',
                    icon: 'alert', type: 'danger', singleButton: true
                });
            }
        }
    }

    function openAddProductModal() {
        let selectedFile = null;

        const formHtml = `
            <div class="edit-grid" style="gap: 2rem; align-items: stretch;">
                <!-- Columna Izquierda -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="field-group">
                        <label>Nombre del producto <span style="color:var(--danger);">*</span></label>
                        <input type="text" id="new-name" class="field-input" placeholder="Ej: Amortiguador de gas">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="field-group">

                        <label>Categoría <span style="color:var(--danger);">*</span></label>
                        <select id="new-cat" class="field-select">

                    <div class="field-group">
                        <label>Descripción breve <span style="color:var(--danger);">*</span></label>
                        <textarea id="new-desc-breve" class="field-area" rows="3" placeholder="Resumen corto del producto..."></textarea>
                    </div>
                </div>

                <!-- Columna Derecha -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="field-group">
                        <label>Imagen del producto <span style="color:var(--danger);">*</span></label>
                        <div class="img-preview-box" id="newImgBox" style="height: 210px; background-image: none; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;">
                            <label class="upload-overlay" style="cursor:pointer; height:100%; width:100%; display: flex; flex-direction:column; align-items: center; justify-content: center; gap:0.5rem; transition: 0.3s; background: rgba(0,0,0,0.02);">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                <span id="new-img-label" style="font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;">Seleccionar imagen</span>
                                <input type="file" id="new-img-file" style="display:none;" accept="image/*" onchange="previewNewImageInternal(this)">
                            </label>
                        </div>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            La imagen se subirá automáticamente a Cloudinary.
                        </p>
                    </div>

                    <div class="field-group" style="flex-grow: 1;">
                        <label>Descripción completa <span style="color:var(--danger);">*</span></label>
                        <textarea id="new-desc-completa" class="field-area" style="height: 100%; min-height: 160px;" placeholder="Describe todos los beneficios técnicos a detalle..."></textarea>
                    </div>
                </div>
            </div>
        `;

        showAppModal({
            title: 'Agregar producto',
            htmlContent: formHtml,
            icon: 'edit',
            confirmText: 'Guardar producto',
            keepOpen: true,
            wide: true,
            onConfirm: async () => {
                const nombre      = document.getElementById('new-name').value.trim();
                const precio      = document.getElementById('new-price').value.trim();
                const stock       = document.getElementById('new-stock').value.trim();
                const cat         = document.getElementById('new-cat').value;
                const desc_breve  = document.getElementById('new-desc-breve').value.trim();
                const desc_completa = document.getElementById('new-desc-completa').value.trim();
                const fileInput   = document.getElementById('new-img-file');
                const file        = fileInput.files[0];

                if (!nombre || !precio || !stock || !desc_breve || !desc_completa || !file) {
                    showAppModal({
                        title: 'Campos incompletos',
                        body: 'Debes rellenar todos los campos y seleccionar una imagen antes de guardar.',
                        icon: 'alert', type: 'danger', confirmText: 'Entendido', singleButton: true
                    });
                    return;
                }

                // Mostrar indicador de carga
                const confirmBtn = document.querySelector('.modal-confirm-btn');
                if (confirmBtn) { 
                    confirmBtn.disabled = true; 
                    confirmBtn.classList.add('btn-loading');
                    confirmBtn.innerHTML = 'Subiendo imagen...'; 
                }

                try {
                    // 1. Subir imagen a Cloudinary
                    const imageUrl = await uploadToCloudinary(file);

                    // 2. Crear producto en la API
                    const res = await fetch('http://127.0.0.1:8008/productos/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nombre, precio, stock: parseInt(stock),
                            desc_breve, desc_completa,
                            imagen: imageUrl, cat, active: true
                        })
                    });

                    if (res.ok) {
                        const newProduct = await res.json();
                        productos.push(newProduct);
                        applyFilters();
                        closeModal();
                        setTimeout(() => {
                            showAppModal({
                                title: '¡Producto agregado!',
                                body: `"${nombre}" fue registrado exitosamente en el catálogo.`,
                                icon: 'help', confirmText: 'Excelente', singleButton: true
                            });
                        }, 350);
                    } else {
                        const err = await res.json();
                        throw new Error(err.detail || 'Error al guardar el producto');
                    }
                } catch(e) {
                    showAppModal({
                        title: 'Error de subida',
                        body: 'No pudimos procesar la imagen. Verifica que el archivo sea menor a 5MB e inténtalo de nuevo.',
                        icon: 'alert', type: 'danger', confirmText: 'Entendido', singleButton: true, keepOpen: true
                    });
                    if (confirmBtn) { 
                        confirmBtn.disabled = false; 
                        confirmBtn.classList.remove('btn-loading');
                        confirmBtn.innerHTML = 'Guardar producto'; 
                    }
                }
            }
        });
    }

    function previewNewImageInternal(input) {
        const box = document.getElementById('newImgBox');
        const label = document.getElementById('new-img-label');
        const overlay = box.querySelector('.upload-overlay');
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                box.style.backgroundImage = `url(${e.target.result})`;
                label.innerText = 'IMAGEN SELECCIONADA';
                overlay.style.background = 'rgba(0,0,0,0.4)';
                overlay.style.color = 'white';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function handleImagePreview(input) {
        // Redirigir a la función interna
        previewNewImageInternal(input);
    }

    function toggleDownloadMenu() {
        document.getElementById("downloadMenu").classList.toggle("show-dropdown");
    }

    window.onclick = function(event) {
        if (!event.target.closest('.download-dropdown')) {
            const dropdowns = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show-dropdown')) {
                    openDropdown.classList.remove('show-dropdown');
                }
            }
        }
    }

    function downloadInventory(type = 'pdf') {
        const dataToExport = window.filteredProducts || productos;
        if (dataToExport.length === 0) return;
        const dateKey = new Date().toISOString().substring(0, 10);
        const filename = `inventario_macuin_${dateKey}`;

        if (type === 'pdf') {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(10, 10, 31);
            doc.rect(0, 0, 210, 25, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16); doc.setFont("helvetica", "bold");
            doc.text("MACUIN - REPORTE DE INVENTARIO", 15, 16);

            const body = dataToExport.map(p => [p.id, p.nombre, p.cat, `$${p.precio}`, `${p.stock} pz`]);
            doc.autoTable({
                head: [['ID', 'Producto', 'Categoría', 'Precio', 'Stock']],
                body: body,
                startY: 30,
                headStyles: { fillColor: [10, 10, 31] }
            });
            doc.save(`${filename}.pdf`);
        } else if (type === 'xlsx') {
            const data = dataToExport.map(p => ({ "ID": p.id, "Producto": p.nombre, "Categoría": p.cat, "Precio (MXN)": p.precio, "Stock": p.stock }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, `${filename}.xlsx`);
        } else if (type === 'docx') {
            if (!window.docx) return;
            const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType } = window.docx;
            const rows = [new TableRow({ children: ["ID", "Producto", "Stock"].map(h => new TableCell({ children: [new Paragraph({ text: h })] })) })];
            dataToExport.forEach(p => rows.push(new TableRow({ children: [
                new TableCell({ children: [new Paragraph({ text: String(p.id) })] }), 
                new TableCell({ children: [new Paragraph({ text: p.nombre })] }), 
                new TableCell({ children: [new Paragraph({ text: String(p.stock) })] })
            ]})));
            const doc = new Document({ 
                sections: [{ 
                    children: [
                        new Paragraph({ text: "INVENTARIO MACUIN", heading: "Heading1" }), 
                        new Paragraph({ text: `Fecha: ${new Date().toLocaleDateString()}` }),
                        new Paragraph({ text: "" }),
                        new Table({ 
                            width: { size: 100, type: WidthType.PERCENTAGE }, 
                            rows: rows,
                            borders: {
                                top: { style: "single", size: 1 },
                                bottom: { style: "single", size: 1 },
                                left: { style: "single", size: 1 },
                                right: { style: "single", size: 1 }
                            }
                        })
                    ] 
                }] 
            });
            Packer.toBlob(doc).then(blob => {
                window.saveAs(blob, `${filename}.docx`);
            });
        }
    }

    // Inicializar llamando a la API
    loadProducts();
</script>
