{% extends "admin_layout.html" %}

{% block breadcrumb_active %}Pedidos{% endblock %}

{% block admin_css %}
<style>
    .orders-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2.5rem;
    }

    .orders-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--text-main);
    }

    .header-actions {
        display: flex;
        gap: 1rem;
    }

    .btn-download-all {
        background: var(--accent);
        color: white;
        padding: 0.75rem 1.25rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        border: none;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

    .btn-download-all:hover {
        filter: brightness(1.2);
        transform: translateY(-2px);
    }

    /* Quick Stats Mini Bar */
    .quick-stats {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .q-stat {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem 1.5rem;
        flex: 1;
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .q-stat-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .q-stat-data span {
        display: block;
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
    }

    .q-stat-data strong {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--text-main);
    }

    .status-tabs {
        display: flex;
        gap: 1rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2rem;
        padding-bottom: 0.5rem;
    }

    .tab-btn {
        background: none;
        border: none;
        padding: 0.75rem 1rem;
        font-weight: 700;
        color: var(--text-muted);
        cursor: pointer;
        position: relative;
        transition: 0.2s;
        font-size: 0.9rem;
    }

    .tab-btn.active {
        color: var(--accent);
    }

    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -0.5rem;
        left: 0;
        width: 100%;
        height: 3px;
        background: var(--accent);
        border-radius: 10px;
    }

    .orders-card {
        background: var(--card-bg);
        border-radius: 20px;
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    thead {
        background: var(--bg-light);
        border-bottom: 1px solid var(--border);
    }

    th {
        padding: 1.25rem 1.5rem;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    td {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        color: var(--text-main);
        font-size: 0.9rem;
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover {
        background: rgba(99, 102, 241, 0.02);
    }

    .order-badge {
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
    }

    .status-processing {
        background: rgba(59, 130, 246, 0.1);
        color: #3B82F6;
    }

    .status-delivered {
        background: rgba(16, 185, 129, 0.1);
        color: #10B981;
    }

    .status-shipped {
        background: rgba(139, 92, 246, 0.1);
        color: #8B5CF6;
    }

    .client-info strong {
        display: block;
        color: var(--text-main);
    }

    .client-info span {
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .btn-view {
        background: var(--bg-light);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.6rem 1rem;
        border-radius: 10px;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-view:hover {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    /* Modern Detail View Styles */
    .detail-container {
        text-align: left;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .detail-section-title {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .detail-section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    .detail-card-glass {
        background: var(--bg-light);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 2rem;
    }

    .products-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .product-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1rem;
        border-bottom: 1px dashed var(--border);
    }

    .product-entry:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    .p-main-info strong {
        display: block;
        font-size: 0.95rem;
        color: var(--text-main);
        margin-bottom: 0.2rem;
    }

    .p-main-info span {
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .p-price-tag {
        font-weight: 800;
        color: var(--text-main);
        font-size: 1rem;
    }

    .logistics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
    }

    .log-data-item {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }

    .log-data-item label {
        font-size: 0.65rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
    }

    .log-data-item p {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
        line-height: 1.5;
    }

    .summary-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1rem;
        padding-top: 1.5rem;
        border-top: 2px solid var(--border);
    }

    .total-label {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text-main);
    }

    .total-amount {
        font-size: 1.75rem;
        font-weight: 900;
        color: var(--accent);
    }

    /* New Phase Selector Styles */
    .phase-selector {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1.5rem;
        padding: 1rem;
        background: var(--bg-light);
        border-radius: 12px;
        border: 1px solid var(--border);
    }

    .phase-option {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: 0.2s;
        background: var(--card-bg);
    }

    .phase-option:hover {
        border-color: var(--accent);
    }

    .phase-option.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .phase-radio {
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .phase-option.active .phase-radio::after {
        content: '';
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
    }
    .btn-download {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        background: var(--card-bg);
        color: var(--text-main);
        border: 1px solid var(--border);
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.85rem;
    }
    .btn-download:hover { 
        background: var(--bg-light);
        border-color: var(--accent);
        transform: translateY(-2px); 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
    }

    .download-dropdown { position: relative; display: inline-block; }
    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        background-color: var(--card-bg);
        min-width: 160px;
        box-shadow: 0px 10px 20px 0px rgba(0,0,0,0.1);
        z-index: 1000;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-top: 5px;
        overflow: hidden;
    }
    .dropdown-content button {
        color: var(--text-main);
        padding: 12px 16px;
        display: block;
        width: 100%;
        border: none;
        background: none;
        text-align: left;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
    }
    .dropdown-content button:hover { background-color: var(--bg-light); color: var(--accent); }
    .show-dropdown { display: block !important; }
</style>
{% endblock %}

{% block admin_content %}
<div class="orders-header">
    <h1>Gestión de pedidos</h1>
    <div class="header-actions">
        <button class="btn-download" style="background: var(--bg-light); border-color: var(--border);" onclick="openFilterModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2L10 12.46V19L14 21V12.46L22 3Z"></path></svg>
            Filtros avanzados
        </button>
        <div class="download-dropdown">
            <button class="btn-download" onclick="toggleDownloadMenu()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Descargar reporte
            </button>
            <div id="downloadMenu" class="dropdown-content">
                <button onclick="downloadOrdersReport('pdf')">Documento PDF (.pdf)</button>
                <button onclick="downloadOrdersReport('xlsx')">Hoja de cálculo (.xlsx)</button>
                <button onclick="downloadOrdersReport('docx')">Documento Word (.docx)</button>
            </div>
        </div>
    </div>
</div>

<div class="quick-stats">
    <div class="q-stat">
        <div class="q-stat-icon" style="background: rgba(59, 130, 246, 0.1); color: #3B82F6;"><svg width="18"
                height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg></div>
        <div class="q-stat-data"><span>Pendientes</span><strong>01</strong></div>
    </div>
    <div class="q-stat">
        <div class="q-stat-icon" style="background: rgba(139, 92, 246, 0.1); color: #8B5CF6;"><svg width="18"
                height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M1 3h15v13H1z"></path>
                <path d="M16 8h4l3 3v5h-7V8z"></path>
                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg></div>
        <div class="q-stat-data"><span>En camino</span><strong>01</strong></div>
    </div>
    <div class="q-stat">
        <div class="q-stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10B981;"><svg width="18"
                height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M20 6L9 17l-5-5"></path>
            </svg></div>
        <div class="q-stat-data"><span>Entregados</span><strong>01</strong></div>
    </div>
</div>

<div class="status-tabs">
    <button class="tab-btn active" onclick="filterByStatus('todos')">Todos los pedidos</button>
    <button class="tab-btn" onclick="filterByStatus('PROCESANDO')">En bodega</button>
    <button class="tab-btn" onclick="filterByStatus('ENVIADO')">En camino</button>
    <button class="tab-btn" onclick="filterByStatus('ENTREGADO')">Completados</button>
</div>

<div class="orders-card">
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Pedido</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Monto total</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- Generado por JS -->
        </tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
    let pedidos = []; // Se poblará dinámicamente
    let baseFetchUrl = "http://127.0.0.1:8008/productos/pedidos/todos";

    async function loadOrders() {
        try {
            const res = await fetch(baseFetchUrl);
            if (!res.ok) throw new Error("Error fetching");
            const data = await res.json();
            // Mapeo adaptativo desde el formato del backend OrdersResponse a la vista de admin
            pedidos = data.map(o => {
                let statusFront = 'PROCESANDO';
                if (o.estado.toLowerCase().includes('camino') || o.estado.toLowerCase() === 'enviado') statusFront = 'ENVIADO';
                if (o.estado.toLowerCase().includes('entregado') || o.estado.toLowerCase() === 'completado') statusFront = 'ENTREGADO';
                
                // Forzar parseo UTC 
                const rawDate = String(o.fecha).endsWith('Z') ? o.fecha : o.fecha + 'Z';
                
                return {
                    no_orden: o.no_orden, // Guardamos el original para la API
                    id: o.no_orden.replace("ORD-", ""),
                    cliente: o.cliente,
                    email: o.cliente.toLowerCase().replace(" ", ".") + "@cliente.com", // Fallback (ya que en base no guardamos email por simplicidad del modelo)
                    fecha: new Date(rawDate).toLocaleDateString('es-MX', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                    timestamp: new Date(rawDate).getTime(),
                    total: parseFloat(o.total).toFixed(2),
                    estado: statusFront,
                    items: o.items.map(i => ({ nombre: i.product_nombre, cant: i.qty, sub: (i.qty * parseFloat(i.price)).toFixed(2) })),
                    detalles_pago: 'Tarjeta Crédito/Débito', // Por defecto ya que siempre pagamos con tarjeta
                    direccion: 'Dirección registrada en portal Macuin'
                };
            });
            updateStatsBar();
            window.allOrders = pedidos; // Referencia global
            renderOrders(pedidos); // Inicialmente todos
            
            // Inyectamos placeholders ocultos para el estado de los filtros si no existen
            if (!document.getElementById('dateStart_val')) {
                const div = document.createElement('div');
                div.style.display = 'none';
                div.innerHTML = `
                    <input type="hidden" id="dateStart_val">
                    <input type="hidden" id="dateEnd_val">
                    <input type="hidden" id="minAmount_val">
                `;
                document.body.appendChild(div);
            }
        } catch (e) {
            console.error("No se pudo cargar pedidos:", e);
        }
    }

    function updateStatsBar() {
        const p = pedidos.filter(x => x.estado === 'PROCESANDO').length;
        const c = pedidos.filter(x => x.estado === 'ENVIADO').length;
        const e = pedidos.filter(x => x.estado === 'ENTREGADO').length;
        
        document.querySelectorAll('.q-stat-data strong')[0].innerText = p.toString().padStart(2, '0');
        document.querySelectorAll('.q-stat-data strong')[1].innerText = c.toString().padStart(2, '0');
        document.querySelectorAll('.q-stat-data strong')[2].innerText = e.toString().padStart(2, '0');
    }

    function renderOrders(data) {
        const tbody = document.querySelector('#ordersTable tbody');
        tbody.innerHTML = '';
        data.forEach(p => {
            let statusClass = 'status-processing';
            let statusText = 'En bodega';
            if (p.estado === 'ENTREGADO') { statusClass = 'status-delivered'; statusText = 'Entregado'; }
            if (p.estado === 'ENVIADO') { statusClass = 'status-shipped'; statusText = 'En camino'; }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: 800; color: var(--accent);">#ORD-${p.id}</td>
                <td>
                    <div class="client-info">
                        <strong>${p.cliente}</strong>
                        <span>${p.email}</span>
                    </div>
                </td>
                <td>${p.fecha}</td>
                <td style="font-weight: 700;">$${p.total}</td>
                <td><span class="order-badge ${statusClass}">${statusText}</span></td>
                <td>
                    <button class="btn-view" onclick="viewOrderDetails('${p.id}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        Ver detalles
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function viewOrderDetails(id) {
        const p = pedidos.find(x => x.id === id);

        let itemsHtml = '';
        p.items.forEach(item => {
            itemsHtml += `
                <div class="product-entry">
                    <div class="p-main-info">
                        <strong>${item.nombre}</strong>
                        <span>Cantidad: ${item.cant} pieza(s)</span>
                    </div>
                    <div class="p-price-tag">$${item.sub}</div>
                </div>
            `;
        });

        const detailHtml = `
            <div class="detail-container">
                <div class="detail-section-title">Artículos solicitados</div>
                <div class="detail-card-glass">
                    <div class="products-list">
                        ${itemsHtml}
                    </div>
                    <div class="summary-bar">
                        <span class="total-label">Total del pedido</span>
                        <span class="total-amount">$${p.total}</span>
                    </div>
                </div>

                <div class="detail-section-title">Logística y envío</div>
                <div class="detail-card-glass">
                    <div class="logistics-grid">
                        <div class="log-data-item">
                            <label>Receptor de entrega</label>
                            <p>${p.cliente}</p>
                        </div>
                        <div class="log-data-item">
                            <label>Método de pago</label>
                            <p>${p.detalles_pago}</p>
                        </div>
                        <div class="log-data-item" style="grid-column: span 2;">
                            <label>Dirección completa</label>
                            <p>${p.direccion}</p>
                        </div>
                        <div class="log-data-item" style="grid-column: span 2;">
                            <label>Estado logístico actual</label>
                            <div style="margin-top: 0.5rem;">
                                <span class="order-badge ${p.estado === 'ENTREGADO' ? 'status-delivered' : (p.estado === 'ENVIADO' ? 'status-shipped' : 'status-processing')}">
                                    ${p.estado === 'ENTREGADO' ? 'Enviado y entregado' : (p.estado === 'ENVIADO' ? 'En camino a destino' : 'Preparando en bodega')}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        showAppModal({
            title: 'Expediente del pedido #ORD-' + p.id,
            htmlContent: detailHtml,
            icon: 'help',
            confirmText: 'Actualizar fase',
            keepOpen: true,
            onConfirm: () => {
                const phaseHtml = `
                    <div class="phase-selector">
                        <div class="phase-option ${p.estado === 'PROCESANDO' ? 'active' : ''}" onclick="setPhase(this, 'PROCESANDO')">
                            <div class="phase-radio"></div>
                            <span>En bodega (Preparación)</span>
                        </div>
                        <div class="phase-option ${p.estado === 'ENVIADO' ? 'active' : ''}" onclick="setPhase(this, 'ENVIADO')">
                            <div class="phase-radio"></div>
                            <span>Transito (En camino)</span>
                        </div>
                        <div class="phase-option ${p.estado === 'ENTREGADO' ? 'active' : ''}" onclick="setPhase(this, 'ENTREGADO')">
                            <div class="phase-radio"></div>
                            <span>Completado (Entregado)</span>
                        </div>
                    </div>
                    <input type="hidden" id="new-phase-val" value="${p.estado}">
                `;

                showAppModal({
                    title: 'Cambiar fase logística',
                    body: 'Selecciona el nuevo estado para el pedido #ORD-' + p.id + ':',
                    htmlContent: phaseHtml,
                    icon: 'edit',
                    confirmText: 'Confirmar cambio',
                    onConfirm: () => {
                        const newPhase = document.getElementById('new-phase-val').value;
                        
                        // Enviar update al backend para persistencia
                        fetch(`http://127.0.0.1:8008/productos/pedidos/${p.no_orden}/estado`, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ estado: newPhase })
                        }).then(async res => {
                            if(res.ok) {
                                p.estado = newPhase;
                                renderOrders(pedidos);
                                updateStatsBar();

                                setTimeout(() => {
                                    showAppModal({
                                        title: '¡Fase actualizada!',
                                        body: 'El estado del pedido ha sido guardado exitosamente: ' + (newPhase === 'PROCESANDO' ? 'En bodega' : (newPhase === 'ENVIADO' ? 'En camino' : 'Entregado')),
                                        icon: 'help', confirmText: 'Excelente', singleButton: true
                                    });
                                }, 350);
                            } else {
                                const err = await res.json();
                                showAppModal({
                                    title: 'Error de servidor',
                                    body: err.detail || 'No pudimos guardar el nuevo fase logístico en la base de datos.',
                                    icon: 'alert', confirmText: 'Entendido', type: 'danger', singleButton: true
                                });
                            }
                        }).catch(e => {
                            console.error(e);
                            showAppModal({
                                title: 'Error de conexión',
                                body: 'No se pudo establecer contacto con la API central. Intenta más tarde.',
                                icon: 'alert', confirmText: 'Cerrar', type: 'danger', singleButton: true
                            });
                        });
                    }
                });
            }
        });
    }

    function setPhase(el, val) {
        document.querySelectorAll('.phase-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('new-phase-val').value = val;
    }

    let currentStatus = 'todos';

    function filterByStatus(status) {
        currentStatus = status;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(status === 'todos' ? 'Todos' : (status === 'PROCESANDO' ? 'bodega' : (status === 'ENVIADO' ? 'camino' : (status === 'ENTREGADO' ? 'Completados' : '')))));
        });
        applyFilters();
    }

    function openFilterModal() {
        const modalHtml = `
            <div class="filter-modal-content" style="text-align: left;">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">Ajusta los parámetros para segmentar el reporte de pedidos.</p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    <div class="field-group">
                        <label>Desde (Fecha)</label>
                        <input type="date" id="m-dateStart" class="field-input" value="${document.getElementById('dateStart_val')?.value || ''}">
                    </div>
                    <div class="field-group">
                        <label>Hasta (Fecha)</label>
                        <input type="date" id="m-dateEnd" class="field-input" value="${document.getElementById('dateEnd_val')?.value || ''}">
                    </div>
                </div>

                <div class="field-group" style="margin-bottom: 2rem;">
                    <label>Inversión mínima (MXN)</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-weight: 800; color: var(--text-muted);">$</span>
                        <input type="number" id="m-minAmount" class="field-input" style="padding-left: 2rem;" placeholder="0.00" value="${document.getElementById('minAmount_val')?.value || ''}">
                    </div>
                </div>

                <div class="detail-section-title">Accesos rápidos</div>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem;">
                    <button class="cat-btn" onclick="setQuickDate('today')">Hoy</button>
                    <button class="cat-btn" onclick="setQuickDate('week')">Esta semana</button>
                    <button class="cat-btn" onclick="setQuickAmount(5000)">Inversión > $5k</button>
                    <button class="cat-btn" style="border-color: var(--danger); color: var(--danger); background: transparent;" onclick="resetFilters()">Limpiar todo</button>
                </div>

                <!-- Hidden placeholders to keep track of state -->
                <input type="hidden" id="dateStart_val" value="${document.getElementById('dateStart_val')?.value || ''}">
                <input type="hidden" id="dateEnd_val" value="${document.getElementById('dateEnd_val')?.value || ''}">
                <input type="hidden" id="minAmount_val" value="${document.getElementById('minAmount_val')?.value || ''}">
            </div>
        `;

        showAppModal({
            title: 'Filtros de pedidos',
            htmlContent: modalHtml,
            icon: 'edit',
            confirmText: 'Aplicar segmentación',
            onConfirm: () => {
                document.getElementById('dateStart_val').value = document.getElementById('m-dateStart').value;
                document.getElementById('dateEnd_val').value = document.getElementById('m-dateEnd').value;
                document.getElementById('minAmount_val').value = document.getElementById('m-minAmount').value;
                applyFilters();
            }
        });
    }

    function setQuickDate(type) {
        const start = document.getElementById('m-dateStart');
        const end = document.getElementById('m-dateEnd');
        const now = new Date();
        
        if (type === 'today') {
            const todayStr = now.toISOString().split('T')[0];
            start.value = todayStr;
            end.value = todayStr;
        } else if (type === 'week') {
            const lastWeek = new Date();
            lastWeek.setDate(now.getDate() - 7);
            start.value = lastWeek.toISOString().split('T')[0];
            end.value = now.toISOString().split('T')[0];
        }
    }

    function setQuickAmount(amt) {
        document.getElementById('m-minAmount').value = amt;
    }

    function resetFilters() {
        document.getElementById('m-dateStart').value = '';
        document.getElementById('m-dateEnd').value = '';
        document.getElementById('m-minAmount').value = '';
        document.getElementById('dateStart_val').value = '';
        document.getElementById('dateEnd_val').value = '';
        document.getElementById('minAmount_val').value = '';
        applyFilters();
        closeModal();
    }

    function applyFilters() {
        // Obtenemos de los campos ocultos o de los del modal si están presentes (durante el onConfirm)
        const startDate = document.getElementById('dateStart_val')?.value || '';
        const endDate = document.getElementById('dateEnd_val')?.value || '';
        const minAmount = parseFloat(document.getElementById('minAmount_val')?.value) || 0;

        const filtered = pedidos.filter(p => {
            const matchesStatus = currentStatus === 'todos' || p.estado === currentStatus;
            const matchesAmount = parseFloat(p.total) >= minAmount;
            
            const dStart = startDate ? new Date(startDate) : null;
            const dEnd = endDate ? new Date(endDate) : null;
            
            const matchesDateStart = !dStart || p.timestamp >= dStart.getTime();
            const matchesDateEnd = !dEnd || p.timestamp <= (dEnd.getTime() + 86400000);
            
            return matchesStatus && matchesAmount && matchesDateStart && matchesDateEnd;
        });

        window.filteredOrders = filtered;
        renderOrders(filtered);
    }

    function toggleDownloadMenu() {
        document.getElementById("downloadMenu").classList.toggle("show-dropdown");
    }

    window.onclick = function(event) {
        if (!event.target.closest('.download-dropdown')) {
            const dropdowns = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show-dropdown')) {
                    openDropdown.classList.remove('show-dropdown');
                }
            }
        }
    }

    function downloadOrdersReport(type = 'pdf') {
        const dataToExport = window.filteredOrders || pedidos;
        if (dataToExport.length === 0) {
            showAppModal({ title: 'No hay datos', body: 'No hay pedidos para exportar.', icon: 'error', confirmText: 'Cerrar', singleButton: true });
            return;
        }

        const dateKey = new Date().toISOString().substring(0, 10);
        const filename = `reporte_pedidos_macuin_${dateKey}`;

        if (type === 'pdf') {
            generateOrdersPDF(dataToExport, `${filename}.pdf`);
        } else if (type === 'xlsx') {
            generateOrdersExcel(dataToExport, filename);
        } else if (type === 'docx') {
            generateOrdersWord(dataToExport, filename);
        }
    }

    function generateOrdersPDF(data, filename) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageW = 210;

        doc.setFillColor(10, 10, 31);
        doc.rect(0, 0, pageW, 25, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16); doc.setFont("helvetica", "bold");
        doc.text("MACUIN - REPORTE DE PEDIDOS", 15, 16);

        const headers = [['Nº Orden', 'Cliente', 'Fecha', 'Monto', 'Estado']];
        const body = data.map(o => [
            `#ORD-${o.id}`,
            o.cliente,
            o.fecha,
            `$${o.total}`,
            o.estado === 'PROCESANDO' ? 'En bodega' : (o.estado === 'ENVIADO' ? 'En camino' : 'Entregado')
        ]);

        doc.autoTable({
            head: headers,
            body: body,
            startY: 30,
            headStyles: { fillColor: [10, 10, 31] },
            alternateRowStyles: { fillColor: [240, 240, 240] }
        });

        doc.save(filename);
    }

    function generateOrdersExcel(data, filename) {
        const exportData = data.map(o => ({
            "Nº Orden": `#ORD-${o.id}`,
            "Cliente": o.cliente,
            "Email": o.email,
            "Fecha": o.fecha,
            "Total (MXN)": parseFloat(o.total),
            "Estado": o.estado
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Pedidos");
        XLSX.writeFile(wb, `${filename}.xlsx`);
    }

    function generateOrdersWord(data, filename) {
        if (!window.docx) {
            console.error("Librería docx no cargada");
            return;
        }
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType } = window.docx;
        const rows = [
            new TableRow({
                children: ["Nº Orden", "Cliente", "Fecha", "Monto", "Estado"].map(h => 
                    new TableCell({ children: [new Paragraph({ text: h })] })
                )
            })
        ];

        data.forEach(o => {
            rows.push(new TableRow({
                children: [
                    new TableCell({ children: [new Paragraph({ text: `#ORD-${o.id}` })] }),
                    new TableCell({ children: [new Paragraph({ text: String(o.cliente) })] }),
                    new TableCell({ children: [new Paragraph({ text: String(o.fecha) })] }),
                    new TableCell({ children: [new Paragraph({ text: `$${o.total}` })] }),
                    new TableCell({ children: [new Paragraph({ text: String(o.estado) })] })
                ]
            }));
        });

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ text: "MACUIN AUTOPARTES", heading: "Heading1" }),
                    new Paragraph({ text: "Reporte General de Pedidos", heading: "Heading2" }),
                    new Paragraph({ text: `Fecha: ${new Date().toLocaleDateString()}` }),
                    new Paragraph({ text: "" }),
                    new Table({ 
                        width: { size: 100, type: WidthType.PERCENTAGE }, 
                        rows: rows,
                        borders: {
                            top: { style: "single", size: 1 },
                            bottom: { style: "single", size: 1 },
                            left: { style: "single", size: 1 },
                            right: { style: "single", size: 1 }
                        }
                    })
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => {
            window.saveAs(blob, `${filename}.docx`);
        });
    }

    // Init
    document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
