<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MACUIN - Panel administrativo{% endblock %}</title>
    <link rel="icon" href="https://res.cloudinary.com/dpvm2gro2/image/upload/e_negate/v1772562917/1_kj2lq7.png"
        type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode */
            --primary: #0A0A1F;
            --accent: #4338CA;
            --bg-light: #F8FAFC;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --card-bg: #FFFFFF;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --header-bg: #FFFFFF;
        }

        body.dark-mode {
            /* "OLED" Dark Mode */
            --primary: #FFFFFF;
            --accent: #6366F1;
            --bg-light: #020617;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --card-bg: #0F172A;
            --border: #1E293B;
            --header-bg: #0F172A;
            background-color: var(--bg-light);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.2s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            font-size: 14px;
            overflow-x: hidden;
        }

        /* Global Loader */
        #global-loader {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #020617;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        #global-loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-percent {
            font-size: 1.1rem;
            font-weight: 500;
            font-family: monospace;
            letter-spacing: 1px;
            color: #94A3B8;
        }

        .loader-bar-container {
            width: 240px;
            height: 4px;
            background: #334155;
            margin-top: 2rem;
            border-radius: 999px;
            overflow: hidden;
        }

        #loader-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        /* Glass Modal Premium - Adaptive */
        #glass-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.4); z-index: 10000;
            justify-content: center; align-items: center; 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #glass-modal.show { opacity: 1; display: flex; }
        .glass-modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 2.5rem; width: 92%; max-width: 420px;
            text-align: center; color: var(--text-main); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transform: scale(0.9) translateY(20px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #glass-modal.show .glass-modal-content { transform: scale(1) translateY(0); }
        
        .modal-icon-wrapper {
            width: 74px; height: 74px; background: var(--bg-light);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; color: var(--accent); border: 1px solid var(--border);
        }
        .modal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.75rem; color: var(--text-main); letter-spacing: -0.5px; }
        .modal-body-text { font-size: 1rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }
        
        .modal-actions { display: flex; gap: 1rem; margin-top: 1rem; }
        .modal-btn { 
            flex: 1; padding: 0.9rem; border-radius: 14px; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.3s; font-size: 0.95rem;
        }
        .btn-cancel { background: var(--bg-light); color: var(--text-main); border: 1px solid var(--border); }
        .btn-cancel:hover { filter: brightness(0.95); }
        body.dark-mode .btn-cancel:hover { filter: brightness(1.1); }
        .btn-confirm { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-confirm:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Secondary Alert Modal (for non-blocking errors) */
        #glass-alert {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.4); z-index: 11000;
            justify-content: center; align-items: center; 
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            opacity: 0; transition: all 0.3s ease;
        }
        #glass-alert.show { opacity: 1; display: flex; }
        .glass-alert-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 2rem; width: 90%; max-width: 380px;
            text-align: center; color: var(--text-main); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #glass-alert.show .glass-alert-content { transform: scale(1); }
        .alert-btn {
            width: 100%; padding: 0.8rem; border-radius: 12px; font-weight: 700;
            cursor: pointer; border: none; background: var(--accent); color: white;
            transition: 0.3s; margin-top: 1.5rem;
        }
        .alert-btn:hover { filter: brightness(1.1); }

        /* Custom scrollbar for modal */
        .glass-modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .glass-modal-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .glass-modal-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Forms & Interactive Components */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .field-group label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-input, .field-select, .field-area {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }

        .field-input:focus, .field-select:focus, .field-area:focus {
            border-color: var(--accent);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .cat-btn {
            padding: 0.65rem 1.25rem;
            border-radius: 99px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cat-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .cat-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .detail-section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Modal specific adjustments */
        .modal-form-area {
            margin-top: 1.5rem;
        }

        /* Loading Spinner for Buttons */
        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
            display: flex !important;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin-loader 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin-loader {
            to { transform: rotate(360deg); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div id="global-loader">
        <img src="https://res.cloudinary.com/dpvm2gro2/image/upload/v1772562917/1_kj2lq7.png" alt="Logo"
            style="width: 80px; filter: brightness(0) invert(1); margin-bottom: 2rem;">
        <div class="loader-percent"><span id="loader-percentage">0</span>%</div>
        <div class="loader-bar-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <!-- Modal Global Structure -->
    <div id="glass-modal" onclick="if(event.target === this) closeModal()">
        <div class="glass-modal-content" onclick="event.stopPropagation()">
            <div class="modal-icon-wrapper" id="modal-icon-box"></div>
            <h3 class="modal-title" id="modal-title"></h3>
            <p class="modal-body-text" id="modal-body-desc"></p>

            <div id="modal-dynamic-content" class="modal-form-area"></div>

            <div class="modal-actions" id="modal-actions-box">
                <button class="modal-btn btn-cancel" id="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="modal-btn btn-confirm" id="btn-confirm">Continuar</button>
            </div>
        </div>
    </div>

    <!-- Secondary Alert Modal (Stacked) -->
    <div id="glass-alert" onclick="closeAlert()">
        <div class="glass-alert-content" onclick="event.stopPropagation()">
            <div class="modal-icon-wrapper" id="alert-icon-box" style="width: 50px; height: 50px; margin-bottom: 1rem; color: var(--danger);"></div>
            <h4 class="modal-title" id="alert-title" style="font-size: 1.25rem;"></h4>
            <p class="modal-body-text" id="alert-body" style="margin-bottom: 0;"></p>
            <button class="alert-btn" onclick="closeAlert()">Entendido</button>
        </div>
    </div>

    {% block body_content %}{% endblock %}

    <script>
        // Modal Engine
        const MODAL_ICONS = {
            help: `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
            logout: `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`,
            alert: `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
            edit: `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`
        };

        function showAppModal(config) {
            const modal = document.getElementById('glass-modal');
            document.getElementById('modal-title').innerText = config.title;
            document.getElementById('modal-body-desc').innerText = config.body || '';
            document.getElementById('modal-icon-box').innerHTML = MODAL_ICONS[config.icon] || MODAL_ICONS.help;

            const dynamicBox = document.getElementById('modal-dynamic-content');
            if (config.htmlContent) {
                dynamicBox.innerHTML = config.htmlContent;
                dynamicBox.style.display = 'block';
            } else {
                dynamicBox.style.display = 'none';
            }
            
            const modalContent = document.querySelector('.glass-modal-content');
            if(config.wide) {
                modalContent.style.maxWidth = '750px';
            } else {
                modalContent.style.maxWidth = '420px';
            }

            const confirmBtn = document.getElementById('btn-confirm');
            confirmBtn.disabled = false;
            confirmBtn.innerText = config.confirmText || 'Aceptar';
            confirmBtn.className = 'modal-btn ' + (config.type === 'danger' ? 'btn-danger' : 'btn-confirm');
            confirmBtn.onclick = () => { if (config.onConfirm) config.onConfirm(); if (!config.keepOpen) closeModal(); };

            const cancelBtn = document.getElementById('btn-cancel');
            if (config.singleButton) { cancelBtn.style.display = 'none'; }
            else { cancelBtn.style.display = 'block'; }

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('glass-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // Alert Engine (Non-blocking secondary modal)
        function showAppAlert(config) {
            const alertModal = document.getElementById('glass-alert');
            document.getElementById('alert-title').innerText = config.title;
            document.getElementById('alert-body').innerText = config.body || '';
            document.getElementById('alert-icon-box').innerHTML = MODAL_ICONS[config.icon] || MODAL_ICONS.alert;
            document.getElementById('alert-icon-box').style.color = config.type === 'danger' ? 'var(--danger)' : 'var(--accent)';
            
            alertModal.style.display = 'flex';
            setTimeout(() => alertModal.classList.add('show'), 10);
        }

        function closeAlert() {
            const alertModal = document.getElementById('glass-alert');
            alertModal.classList.remove('show');
            setTimeout(() => alertModal.style.display = 'none', 200);
        }

        // Dark Mode Logic
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('bepe-dark-mode', isDark);
        }

        if (localStorage.getItem('bepe-dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Loader Engine
        const loader = document.getElementById('global-loader');
        const barEl = document.getElementById('loader-bar');
        const percentEl = document.getElementById('loader-percentage');

        function updateLoader(val) {
            val = Math.min(100, Math.floor(val));
            percentEl.textContent = val;
            barEl.style.width = val + '%';
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateLoader(100);
            setTimeout(() => loader.classList.add('hidden'), 400);
        });

        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link && link.href && !link.target && !link.href.includes('#') && !link.classList.contains('no-loader')) {
                e.preventDefault();
                loader.classList.remove('hidden');
                updateLoader(40);
                setTimeout(() => window.location.href = link.href, 250);
            }
        });

        // Lógica de perfil de administrador dinámico
        document.addEventListener("DOMContentLoaded", () => {
            const adminData = localStorage.getItem('macuin_admin_user');
            if (adminData) {
                try {
                    const user = JSON.parse(adminData);
                    const nameEls = document.querySelectorAll('.user-name');
                    const avatarEls = document.querySelectorAll('.user-avatar');
                    
                    if (user && user.nombre) {
                        nameEls.forEach(el => el.innerText = user.nombre);
                        
                        // Obtener iniciales (hasta 2) del nombre
                        const parts = user.nombre.split(' ').filter(p => p.trim() !== '');
                        let initials = '';
                        if (parts.length >= 2) {
                            initials = (parts[0][0] + parts[1][0]).toUpperCase();
                        } else if (parts.length === 1) {
                            initials = parts[0].substring(0, 2).toUpperCase();
                        }
                        
                        avatarEls.forEach(el => el.innerText = initials);
                    }
                } catch (e) {
                    console.error("Error leyendo datos del administrador", e);
                }
            } else {
                // Prevenir mostrar info hardcodeada si no hay datos de sesión (o redirigir)
                const nameEls = document.querySelectorAll('.user-name');
                const avatarEls = document.querySelectorAll('.user-avatar');
                nameEls.forEach(el => el.innerText = "Administrador");
                avatarEls.forEach(el => el.innerText = "AD");
            }
        });
    </script>
</body>

</html>
