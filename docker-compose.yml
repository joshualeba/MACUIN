services:
  portal_clientes:
    build:
      context: ./portal_clientes
    ports:
      - "8005:80"
    volumes:
      - ./portal_clientes:/var/www/html
      - portal_vendor:/var/www/html/vendor
      - portal_storage:/var/www/html/storage

  portal_admin:
    build:
      context: ./portal_admin
    ports:
      - "5005:5000"
    volumes:
      - ./portal_admin:/app
    environment:
      - API_URL=http://api_central:8008

  api_central:
    build:
      context: ./api_central
    ports:
      - "8008:8008"
    volumes:
      - ./api_central:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8008 --reload

volumes:
  portal_vendor:
  portal_storage:
